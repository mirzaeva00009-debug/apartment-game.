<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; z-index: 10; font-family: monospace; background: rgba(255,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <div id="ui">GRAPHICS STRESS TEST V5.0<br>SHADOWS: ON | HIGH-RES</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // ВКЛЮЧАЕМ ТЕНИ
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // МЯГКИЕ ТЕНИ
        document.body.appendChild(renderer.domElement);

        // СВЕТ С ТЕНЯМИ
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(2, 4, 2);
        light.castShadow = true; 
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        scene.add(light);

        const ambient = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambient);

        // ПОЛ (Принимает тени)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x444444 })
        );
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        // СТЕНЫ
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(10, 5, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x666666 })
        );
        wall.position.z = -5;
        wall.receiveShadow = true;
        scene.add(wall);

        // СТОЛ (Отбрасывает тени)
        const table = new THREE.Group();
        const top = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1.2), new THREE.MeshStandardMaterial({color: 0x4a2e19}));
        top.position.y = 0.8; top.castShadow = true; top.receiveShadow = true;
        table.add(top);

        const legGeo = new THREE.BoxGeometry(0.1, 0.8, 0.1);
        [[-1.1,0.4,-0.5],[1.1,0.4,-0.5],[-1.1,0.4,0.5],[1.1,0.4,0.5]].forEach(p => {
            const l = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({color: 0x222222}));
            l.position.set(...p); l.castShadow = true;
            table.add(l);
        });
        table.position.set(0, 0, -2);
        scene.add(table);

        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, -2);

        function animate() {
            requestAnimationFrame(animate);
            table.rotation.y += 0.005; // Вращаем стол для проверки теней
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
