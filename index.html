<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>3D Mobile Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; background: #000; }
      #joystick-zone {
        position: absolute;
        bottom: 50px;
        left: 50px;
        width: 120px;
        height: 120px;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <a-scene renderer="antialias: true; colorManagement: true;" shadow="type: pcfsoft" loading-screen="enabled: false">
      <a-sky color="#050505"></a-sky>
      <a-entity light="type: ambient; intensity: 0.7; color: #fff"></a-entity>
      <a-entity light="type: point; intensity: 1; position: 0 3 -2"></a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#111"></a-plane>
      <a-box position="0 2.5 -5" width="10" height="5" depth="0.2" color="#2c3e50"></a-box>
      <a-box position="-5 2.5 0" width="0.2" height="5" depth="10" color="#2c3e50"></a-box>
      <a-box position="5 2.5 0" width="0.2" height="5" depth="10" color="#2c3e50"></a-box>

      <a-entity position="0 0 -3">
        <a-box position="0 0.8 0" width="2.2" height="0.1" depth="1.2" color="#4e342e"></a-box>
        <a-box position="-1 0.4 -0.5" width="0.1" height="0.8" depth="0.1" color="#1a1a1a"></a-box>
        <a-box position="1 0.4 -0.5" width="0.1" height="0.8" depth="0.1" color="#1a1a1a"></a-box>
      </a-entity>

      <a-entity id="rig" movement-controls="controls: touch; speed: 0.15">
        <a-entity id="camera" camera 
                  position="0 1.6 2" 
                  look-controls="pointerLockEnabled: false; touchEnabled: true; magicWindowTrackingEnabled: false">
        </a-entity>
      </a-entity>
    </a-scene>

    <div id="joystick-zone"></div>

    <script>
      window.onload = function() {
        // Создаем джойстик
        var manager = nipplejs.create({
          zone: document.getElementById('joystick-zone'),
          mode: 'static',
          position: {left: '50%', top: '50%'},
          color: 'white',
          size: 100
        });

        const rig = document.getElementById('rig');
        
        manager.on('move', function (evt, data) {
          if (data.vector) {
            // Принудительно передаем движение только от джойстика
            rig.components['movement-controls'].velocity.x = data.vector.x * 0.2;
            rig.components['movement-controls'].velocity.z = -data.vector.y * 0.2;
          }
        });

        manager.on('end', function () {
          rig.components['movement-controls'].velocity.set(0, 0, 0);
        });

        // ФИКС КАМЕРЫ: отключаем скролл страницы, чтобы обзор работал на 360
        document.addEventListener('touchmove', function(e) {
          if (e.touches.length > 1) return; // Разрешаем зум пальцами если надо
          e.preventDefault();
        }, { passive: false });
      };
    </script>
  </body>
</html>
